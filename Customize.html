<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customize</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 py-lg-5 app-shell">
    <header class="topbar rounded-5 px-3 px-lg-4 py-3 mb-4 mb-lg-5">
      <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3 justify-content-between">
        <div class="d-flex align-items-center gap-3">
          <div class="brand-mark">CP</div>
          <div>
            <p class="text-uppercase small mb-1 text-secondary">Campaign Forge</p>
            <h1 class="h3 mb-0">Customize</h1>
          </div>
        </div>
        <ul class="nav nav-pills flex-wrap gap-2 small">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="Play.html">Play</a></li>
          <li class="nav-item"><a class="nav-link" href="CharacterPage.html">Character</a></li>
          <li class="nav-item"><a class="nav-link" href="Campaign.html">Campaign</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="Customize.html">Customize</a></li>
          <li class="nav-item"><a class="nav-link" href="Library.html">Library</a></li>
          <li class="nav-item"><a class="nav-link" href="Account.html">Account</a></li>
        </ul>
      </div>
    </header>

    <section class="page-hero p-4 p-lg-5 mb-4">
      <p class="text-uppercase small mb-2">Preferences</p>
      <h2 class="display-5 fw-semibold mb-3">Personalize your game experience.</h2>
      <p class="helper-text mb-0">Adjust the way you organize content, builds, and interface settings.</p>
    </section>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="builder-card p-4 h-100">
          <h3 class="h4 mb-3">Layout Preferences</h3>
          <div class="mb-3">
            <label class="form-label">Default Landing Section</label>
            <select class="form-select">
              <option selected>Home</option>
              <option>Character</option>
              <option>Campaign</option>
            </select>
          </div>
          <div>
            <label class="form-label">Display Density</label>
            <select class="form-select">
              <option selected>Comfortable</option>
              <option>Compact</option>
            </select>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="builder-card p-4 h-100">
          <h3 class="h4 mb-3">Build Preferences</h3>
          <div class="mb-3">
            <label class="form-label">Default Character Sheet Type</label>
            <select class="form-select">
              <option selected>Standard</option>
              <option>Campaign Ready</option>
              <option>Draft Focused</option>
            </select>
          </div>
          <div>
            <label class="form-label">Auto-save Drafts</label>
            <select class="form-select">
              <option selected>Enabled</option>
              <option>Disabled</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
